<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인공지능 마법 연필 🪄</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FFD166',
                        secondary: '#4EA8DE',
                        accent: '#EF476F',
                        success: '#06D6A0',
                    }
                }
            }
        }
    </script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FFD166;
            --secondary: #4EA8DE;
            --accent: #EF476F;
            --success: #06D6A0;
        }
        body {
            font-family: 'Nanum Gothic', sans-serif;
            background-color: #FFF9E6;
        }
        .font-playful {
            font-family: 'Gaegu', cursive;
        }
        .step-content {
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
        }
        .step-content.active {
            display: flex;
            opacity: 1;
            flex-direction: column;
        }
        
        /* 탭 버튼 활성화 스타일 */
        .nav-btn.active {
            background-color: var(--primary);
            color: #78350f; /* 짙은 갈색 텍스트 */
            font-weight: 800;
            transform: scale(1.05);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        /* 퀴즈 카드 뒤집기 효과용 클래스 */
        .card-flip {
            animation: flipIn 0.5s ease-out forwards;
        }
        @keyframes flipIn {
            0% { transform: rotateY(-90deg) scale(0.8); opacity: 0; }
            100% { transform: rotateY(0) scale(1); opacity: 1; }
        }

        /* 통통 튀는 애니메이션 */
        .bounce-hover:hover {
            animation: bounce 1s infinite;
        }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <!-- 왼쪽 사이드바 (PC 환경) -->
    <div class="hidden lg:flex flex-col w-64 bg-white shadow-xl z-10 border-r-4 border-primary">
        <div class="p-6 bg-primary text-center">
            <h1 class="text-3xl font-black text-yellow-900 font-playful mt-2">마법 연필 🪄</h1>
        </div>
        
        <nav class="flex-1 p-4 flex flex-col gap-3 overflow-y-auto">
            <!-- 선생님이 버튼을 추가하거나 삭제할 수 있습니다 -->
            <button onclick="showStep(1)" class="nav-btn active flex items-center gap-3 p-4 rounded-2xl transition-all hover:bg-yellow-100 text-gray-600 text-left">
                <div class="bg-white p-2 rounded-xl shadow-sm"><i data-lucide="wand-2" class="w-6 h-6 text-accent"></i></div>
                <span class="text-lg">1. 마법 만나기</span>
            </button>
            <button onclick="showStep(2)" class="nav-btn flex items-center gap-3 p-4 rounded-2xl transition-all hover:bg-yellow-100 text-gray-600 text-left">
                <div class="bg-white p-2 rounded-xl shadow-sm"><i data-lucide="palette" class="w-6 h-6 text-secondary"></i></div>
                <span class="text-lg">2. 마법사 되기</span>
            </button>
            <button onclick="showStep(3)" class="nav-btn flex items-center gap-3 p-4 rounded-2xl transition-all hover:bg-yellow-100 text-gray-600 text-left">
                <div class="bg-white p-2 rounded-xl shadow-sm"><i data-lucide="help-circle" class="w-6 h-6 text-success"></i></div>
                <span class="text-lg">3. 무엇일까요?</span>
            </button>
            <button onclick="showStep(4)" class="nav-btn flex items-center gap-3 p-4 rounded-2xl transition-all hover:bg-yellow-100 text-gray-600 text-left">
                <div class="bg-white p-2 rounded-xl shadow-sm"><i data-lucide="award" class="w-6 h-6 text-primary"></i></div>
                <span class="text-lg">4. 마법 전시회</span>
            </button>
        </nav>
    </div>

    <!-- 메인 콘텐츠 영역 -->
    <div class="flex-1 overflow-y-auto p-6 lg:p-10 pb-32 lg:pb-10 relative bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMiIgY3k9IjIiIHI9IjIiIGZpbGw9IiNGRkQxNjYiIGZpbGwtb3BhY2l0eT0iMC4yIi8+PC9zdmc+')]">
        
        <!-- 단계별 화면 -->
        <main class="max-w-4xl mx-auto h-full">
            
            <!-- Step 1: 마법 만나기 (도입) -->
            <div id="step1" class="step-content active h-full justify-center">
                <h2 class="text-6xl font-black mb-12 text-center text-accent font-playful tracking-wider">
                    마법 연필을 만나보세요!
                </h2>
                
                <div class="flex flex-col md:flex-row items-center justify-center gap-8">
                    <!-- 서툰 강아지 그림 (도입) -->
                    <div class="bg-white p-6 rounded-[3rem] shadow-lg border-8 border-dashed border-gray-300 w-64 h-64 flex items-center justify-center">
                        <svg class="w-48 h-48 text-gray-400" viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
                            <!-- 얼굴 -->
                            <path d="M 50 100 Q 100 50 150 100 Q 170 150 100 170 Q 30 150 50 100 Z" />
                            <!-- 귀 -->
                            <path d="M 50 100 Q 20 50 60 60" />
                            <path d="M 150 100 Q 180 50 140 60" />
                            <!-- 눈, 코 -->
                            <circle cx="80" cy="110" r="5" fill="currentColor" />
                            <circle cx="120" cy="110" r="5" fill="currentColor" />
                            <ellipse cx="100" cy="130" rx="10" ry="6" fill="currentColor" />
                            <!-- 서툰 선 추가 -->
                            <path d="M 30 180 Q 100 130 170 180" stroke-width="4" stroke-dasharray="15 15"/>
                        </svg>
                    </div>
                    
                    <!-- 마법봉 버튼 -->
                    <button onclick="doMagic()" class="bg-primary hover:bg-yellow-400 p-8 rounded-full shadow-2xl transform hover:scale-110 transition-all bounce-hover group border-4 border-white">
                        <i data-lucide="wand-2" class="w-20 h-20 text-white group-hover:rotate-12 transition-transform"></i>
                    </button>
                    
                    <!-- 변신한 멋진 강아지 그림 (초기엔 숨김) -->
                    <div id="cleanResult" class="bg-white p-10 rounded-[3rem] shadow-lg border-8 border-success w-64 h-64 flex flex-col items-center justify-center opacity-0 transform scale-50 transition-all duration-700 ease-out">
                        <span class="text-8xl mb-2">🐶</span>
                        <span class="text-4xl font-black text-success font-playful mt-2">짠!</span>
                    </div>
                </div>
                
                <p class="text-3xl font-bold text-center text-gray-600 mt-12 bg-white/80 py-4 px-8 rounded-full inline-block self-center">
                    마법봉을 눌러보세요! 👉
                </p>
            </div>

            <!-- Step 2: 마법사 되기 (전개) -->
            <div id="step2" class="step-content h-full justify-center">
                <h2 class="text-6xl font-black mb-10 text-center text-secondary font-playful tracking-wider">
                    내가 바로 마법사!
                </h2>
                
                <div class="flex flex-col items-center justify-center">
                    <!-- 오토드로우 새창 열기 버튼 (깔끔한 팔레트 디자인으로 복구) -->
                    <a href="https://www.autodraw.com/" target="_blank" class="bg-white hover:bg-yellow-50 p-12 rounded-[4rem] shadow-2xl flex flex-col items-center gap-10 transform hover:-translate-y-2 hover:shadow-blue-200 transition-all w-full max-w-2xl border-8 border-secondary group relative">
                        
                        <div class="relative">
                            <i data-lucide="palette" class="w-48 h-48 text-secondary group-hover:animate-spin transition-transform duration-700"></i>
                            <!-- 통통 튀는 마법 연필 아이콘 -->
                            <div class="absolute -bottom-4 -right-4 group-hover:animate-bounce">
                                <i data-lucide="pencil" class="w-20 h-20 text-accent transform -rotate-45"></i>
                            </div>
                        </div>

                        <span class="text-6xl font-black font-playful tracking-widest text-gray-800">그림 그리기</span>
                        
                        <!-- 시작 버튼 -->
                        <span class="text-5xl font-bold bg-secondary text-white px-16 py-6 rounded-full shadow-inner flex items-center gap-4">
                            시작! 🚀
                        </span>
                    </a>
                </div>
            </div>

            <!-- Step 3: 퀴즈 (전개 2) -->
            <div id="step3" class="step-content h-full justify-start pt-10">
                <h2 class="text-6xl font-black mb-10 text-center text-success font-playful tracking-wider">
                    무엇을 그릴까요?
                </h2>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 p-4">
                    <!-- 카드 1 -->
                    <button onclick="revealCard(1, '🚗')" class="bg-white border-8 border-gray-200 rounded-[3rem] aspect-square flex flex-col items-center justify-center transform hover:scale-105 transition-transform shadow-xl relative overflow-hidden group" id="card1">
                        <div class="absolute inset-0 bg-gray-100 group-hover:bg-gray-200 transition-colors"></div>
                        <span class="text-9xl relative z-10" id="card1-icon">❓</span>
                        <span class="text-4xl font-black mt-4 text-gray-400 relative z-10 font-playful" id="card1-text">눌러요!</span>
                    </button>
                    <!-- 카드 2 -->
                    <button onclick="revealCard(2, '🐶')" class="bg-white border-8 border-gray-200 rounded-[3rem] aspect-square flex flex-col items-center justify-center transform hover:scale-105 transition-transform shadow-xl relative overflow-hidden group" id="card2">
                        <div class="absolute inset-0 bg-gray-100 group-hover:bg-gray-200 transition-colors"></div>
                        <span class="text-9xl relative z-10" id="card2-icon">❓</span>
                        <span class="text-4xl font-black mt-4 text-gray-400 relative z-10 font-playful" id="card2-text">눌러요!</span>
                    </button>
                    <!-- 카드 3 -->
                    <button onclick="revealCard(3, '🍕')" class="bg-white border-8 border-gray-200 rounded-[3rem] aspect-square flex flex-col items-center justify-center transform hover:scale-105 transition-transform shadow-xl relative overflow-hidden group" id="card3">
                        <div class="absolute inset-0 bg-gray-100 group-hover:bg-gray-200 transition-colors"></div>
                        <span class="text-9xl relative z-10" id="card3-icon">❓</span>
                        <span class="text-4xl font-black mt-4 text-gray-400 relative z-10 font-playful" id="card3-text">눌러요!</span>
                    </button>
                </div>
            </div>

            <!-- Step 4: 마법 전시회 (정리) -->
            <div id="step4" class="step-content h-full justify-center">
                <div class="flex flex-col items-center justify-center gap-8">
                    <h2 class="text-7xl font-black text-center text-primary font-playful tracking-widest drop-shadow-md">
                        최고의 마법사!
                    </h2>
                    <h3 class="text-4xl font-bold text-gray-500 mb-4">(최고예요! 🌟)</h3>
                    
                    <!-- 패들렛 링크 연결 버튼 -->
                    <a href="https://padlet.com/sorbaramkind/breakout-room/3jXMqpQ15yejvAzx-EDj3vrl8rKGEz9r6" target="_blank" class="bg-white hover:bg-yellow-50 p-10 rounded-[4rem] shadow-2xl flex flex-col items-center gap-6 transform hover:-translate-y-2 hover:shadow-yellow-200 transition-all w-full max-w-2xl border-8 border-primary group relative">
                        <!-- 반짝이는 트로피 장식 -->
                        <div class="absolute -top-8 -right-8 animate-bounce z-20">
                            <span class="text-[8rem] drop-shadow-xl">🏆</span>
                        </div>
                        
                        <div class="relative">
                            <i data-lucide="image" class="w-40 h-40 text-primary group-hover:scale-110 transition-transform duration-500"></i>
                            <div class="absolute -bottom-2 -right-2">
                                <span class="text-5xl">👀</span>
                            </div>
                        </div>
                        
                        <span class="text-5xl font-black font-playful text-gray-800">친구들 그림 보기</span>
                        
                        <span class="text-4xl font-bold bg-primary text-white px-12 py-5 rounded-full shadow-inner flex items-center gap-4">
                            출발! 🚀
                        </span>
                    </a>
                    
                    <div class="flex gap-6 mt-4">
                        <span class="text-6xl animate-pulse">👏</span>
                        <span class="text-6xl animate-pulse" style="animation-delay: 0.2s">👏</span>
                        <span class="text-6xl animate-pulse" style="animation-delay: 0.4s">👏</span>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- 모바일 하단 네비게이션 바 (태블릿/모바일 환경) -->
    <div class="fixed bottom-0 w-full bg-white/95 backdrop-blur-md p-4 flex justify-between items-center border-t-4 border-primary lg:hidden shadow-[0_-10px_40px_rgba(0,0,0,0.1)] z-50">
        <button onclick="showStep(prevStep())" class="bg-gray-100 p-4 rounded-[2rem] hover:bg-gray-200 text-gray-600 active:scale-95 transition-transform">
            <i data-lucide="arrow-left" class="w-10 h-10"></i>
        </button>
        <span class="text-2xl font-black text-gray-700 font-playful" id="mobile-step-indicator">1 / 4</span>
        <button onclick="showStep(nextStep())" class="bg-primary px-10 py-5 rounded-[2rem] font-black text-3xl text-yellow-900 shadow-lg active:scale-95 transition-transform flex items-center gap-2">
            다음 <i data-lucide="arrow-right" class="w-8 h-8"></i>
        </button>
    </div>

    <script>
        lucide.createIcons();
        
        let currentStep = 1;
        const totalSteps = 4;

        function showStep(n) {
            currentStep = n;
            
            // 모든 콘텐츠 내용 숨기기
            document.querySelectorAll('.step-content').forEach(el => el.classList.remove('active'));
            
            // 탭 버튼 색상(active) 업데이트
            document.querySelectorAll('.nav-btn').forEach((btn, idx) => {
                btn.classList.toggle('active', idx + 1 === n);
            });
            
            // 클릭한 번호의 콘텐츠만 화면에 표시
            document.getElementById('step' + n).classList.add('active');
            
            // 모바일 인디케이터 업데이트
            const indicator = document.getElementById('mobile-step-indicator');
            if(indicator) indicator.innerText = `${n} / ${totalSteps}`;
            
            // Step 1로 돌아오면 마법 효과 초기화
            if(n === 1) resetMagic();
        }

        function nextStep() {
            return currentStep < totalSteps ? currentStep + 1 : 1;
        }

        function prevStep() {
            return currentStep > 1 ? currentStep - 1 : totalSteps;
        }

        // --- Step 1: 마법봉 애니메이션 ---
        function doMagic() {
            const result = document.getElementById('cleanResult');
            // 스케일과 투명도를 조절하여 '짠!' 하고 나타나는 효과
            result.classList.remove('opacity-0', 'scale-50');
            result.classList.add('opacity-100', 'scale-100');
            
            // 통통 튀는 효과 애니메이션 추가
            result.classList.add('animate-bounce');
            setTimeout(() => {
                result.classList.remove('animate-bounce');
            }, 1000);
        }

        function resetMagic() {
            const result = document.getElementById('cleanResult');
            result.classList.remove('opacity-100', 'scale-100');
            result.classList.add('opacity-0', 'scale-50');
        }

        // --- Step 3: 카드 뒤집기 퀴즈 ---
        function revealCard(cardNum, emoji) {
            const card = document.getElementById(`card${cardNum}`);
            const icon = document.getElementById(`card${cardNum}-icon`);
            const text = document.getElementById(`card${cardNum}-text`);
            
            // 테두리 색상 변경
            card.classList.remove('border-gray-200');
            card.classList.add('border-success', 'bg-green-50');
            
            // 이모지 및 텍스트 변경
            icon.innerText = emoji;
            text.innerText = "우와!";
            text.classList.remove('text-gray-400');
            text.classList.add('text-success');
            
            // 튀어 오르는 애니메이션 재실행
            icon.classList.remove('card-flip');
            void icon.offsetWidth; // DOM reflow
            icon.classList.add('card-flip');
        }

        // 초기 화면 설정
        showStep(1);
    </script>
</body>
</html>
