<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>마우스 마법 학교</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" />
    <style>
        body { font-family: 'Nanum Gothic', sans-serif; background-color: #eef2f3; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        
        /* 타이틀 영역 스타일 */
        .title-container { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        h1 { color: #2c3e50; font-size: 40px; margin: 0; }
        .main-icon { font-size: 45px; color: #3498db; vertical-align: middle; }

        p { color: #7f8c8d; font-size: 20px; margin-bottom: 30px; }
        .menu-container { display: flex; gap: 20px; }
        .card { width: 250px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; cursor: pointer; transition: transform 0.3s; border: 4px solid transparent; }
        .card:hover { transform: translateY(-10px); border-color: #3498db; }
        .card h2 { font-size: 24px; color: #3498db; }
        .icon { font-size: 60px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="title-container">
        <span class="material-symbols-outlined main-icon">mouse</span>
        <h1>마우스 마법 학교</h1>
    </div>
    <p>배우고 싶은 마법을 선택하세요!</p>
    
    <div class="menu-container">
        <div class="card" onclick="location.href='click.html'">
            <div class="icon">🖱️</div>
            <h2>1단계: 클릭</h2>
            <p>별 스티커를<br>한 번 꾹!</p>
        </div>
        
        <div class="card" onclick="location.href='double.html'">
            <div class="icon">✨</div>
            <h2>2단계: 더블클릭</h2>
            <p>빠르게 두 번<br>딸깍딸깍!</p>
        </div>
        
        <div class="card" onclick="location.href='drag.html'">
            <div class="icon">🤝</div>
            <h2>3단계: 드래그</h2>
            <p>꾹 눌러서<br>이사 가기!</p>
        </div>
    </div>
</body>
</html>
