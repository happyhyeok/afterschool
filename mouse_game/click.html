<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>클릭 마법</title>
    <style>
        body { font-family: 'Nanum Gothic', sans-serif; background-color: #fff9db; text-align: center; overflow: hidden; }
        .target { font-size: 60px; position: absolute; cursor: pointer; transition: transform 0.1s; }
        .target:active { transform: scale(0.8); }
        #home-btn { position: fixed; top: 20px; left: 20px; padding: 10px 20px; font-size: 18px; cursor: pointer; border-radius: 10px; background: #fab005; color: white; border: none; }
        #msg { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 40px; border-radius: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <button id="home-btn" onclick="location.href='index.html'">🏠 대문으로</button>
    <h1 id="lv-text">1단계: 풍선을 터뜨려요! 🎈</h1>
    <div id="game-area" style="height: 80vh; position: relative;"></div>
    <div id="msg"><h2>참 잘했어요!</h2><button onclick="nextLevel()" style="font-size: 20px;">다음 단계</button></div>

    <script>
        let lv = 1;
        let count = 0;
        const emojis = [['🎈'], ['🍎','🍏'], ['🐜','🐞','🐝'], ['⚽','🏀','⚾','🏐'], ['⭐','🌟','✨','💫','🎇']];
        function init() {
            document.getElementById('msg').style.display='none';
            document.getElementById('lv-text').innerText = lv + "단계: 클릭해서 없애기!";
            const area = document.getElementById('game-area');
            area.innerHTML = '';
            count = lv;
            for(let i=0; i<lv; i++) {
                const item = document.createElement('div');
                item.className = 'target';
                item.innerText = emojis[lv-1][i % emojis[lv-1].length];
                item.style.left = Math.random()*80 + 10 + "%";
                item.style.top = Math.random()*70 + 10 + "%";
                item.onclick = () => { item.style.display='none'; count--; if(count===0) showMsg(); };
                area.appendChild(item);
            }
        }
        function showMsg() { document.getElementById('msg').style.display='block'; }
        function nextLevel() { if(lv<5) { lv++; init(); } else { location.href='index.html'; } }
        init();
    </script>
</body>
</html>
