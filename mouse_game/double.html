<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>더블클릭 마법</title>
    <style>
        body { font-family: 'Nanum Gothic', sans-serif; background-color: #e3fafc; text-align: center; overflow: hidden; margin: 0; }
        #home-btn { position: fixed; top: 20px; left: 20px; padding: 10px 20px; font-size: 18px; cursor: pointer; border-radius: 10px; background: #15aabf; color: white; border: none; z-index: 100; }
        .chest { font-size: 80px; cursor: pointer; display: inline-block; margin: 20px; filter: grayscale(1); transition: transform 0.2s; }
        .chest:active { transform: scale(0.9); }
        .open { filter: grayscale(0); }
        #msg { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 40px; border-radius: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.2); z-index: 1000; border: 3px solid #15aabf; }
        #game-area { margin-top: 100px; display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
        button.next-btn { font-size: 20px; padding: 10px 20px; background: #15aabf; color: white; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <button id="home-btn" onclick="location.href='index.html'">🏠 대문으로</button>
    <h1 id="lv-text">2단계: 빠르게 두 번! 딸깍딸깍!</h1>
    <p>보물 상자를 더블클릭해서 열어보세요. (총 5단계)</p>
    
    <div id="game-area"></div>

    <div id="msg">
        <h2 id="msg-title">참 잘했어요! 👏</h2>
        <button class="next-btn" onclick="nextLevel()">다음 단계</button>
    </div>

    <script>
        let lv = 1;
        function init() {
            document.getElementById('msg').style.display = 'none';
            document.getElementById('lv-text').innerText = lv + "단계: 선물 상자를 열어라!";
            const area = document.getElementById('game-area');
            area.innerHTML = '';
            for(let i=0; i<lv; i++) {
                const item = document.createElement('div');
                item.className = 'chest';
                item.innerText = '🎁';
                item.ondblclick = () => { 
                    if(!item.classList.contains('open')) {
                        item.innerText = '💎'; 
                        item.classList.add('open');
                        checkWin();
                    }
                };
                area.appendChild(item);
            }
        }
        function checkWin() {
            if(document.querySelectorAll('.open').length === lv) {
                setTimeout(() => { document.getElementById('msg').style.display = 'block'; }, 300);
            }
        }
        function nextLevel() {
            if(lv < 5) { lv++; init(); } 
            else { location.href='index.html'; }
        }
        init();
    </script>
</body>
</html>
